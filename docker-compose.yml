services:
  backend:
    image: sdg-app-remastered-backend:latest
    build:
      context: ./SDG-App/server
    ports:
      - "8000:8000"
    environment:
      DB_TYPE: sqlite
      DB_NAME: sdg-test.db
      EXTRA_ORIGINS: http://localhost:5173
    volumes:
      - ./SDG-App/server:/app
      - backend_data:/app/db
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    image: sdg-app-remastered-frontend:latest
    build:
      context: ./SDG-App/app
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./SDG-App/app:/app
      - /app/node_modules
    command: ["npm", "run", "dev", "--", "--port", "5173", "--host", "0.0.0.0"]

volumes:
  backend_data:
