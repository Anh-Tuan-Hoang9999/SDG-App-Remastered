name: Tests

on:
  pull_request:
  push:
    branches: [main, frontend/testing, server/testing]

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SDG-App/app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: SDG-App/app/package-lock.json
      - name: Install frontend deps
        run: npm ci
      - name: Run frontend tests
        run: npm run test:run

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: SDG-App/server
    env:
      DB_TYPE: sqlite
      DB_NAME: ci-test.db
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt

      - name: Run backend tests
        run: pytest -q tests
